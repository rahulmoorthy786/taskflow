# Goal - To build and deploy Image from CI

name: CD

on:
     workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v6
              
            - name: Copy .env file
              run: |
                cp .env.example .env

            - name: Docker Setup Login
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
                
            - name: Deploy Image to Docker Hub
              run: |
                docker build -t ${{ secrets.DOCKER_USERNAME }}/taskflow:latest .
                docker push ${{ secrets.DOCKER_USERNAME }}/taskflow:latest
                
            - name: Deploy the container with the Docker compose
              run: |
                docker compose pull
                docker compose up -d
