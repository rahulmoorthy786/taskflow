name: Code Test

on:
    workflow_call:

jobs:
    test:
          runs-on: ubuntu-latest
          steps:
               - name: Checkout Code
                 uses: actions/checkout@v7

               - name: Set up Python
                 uses: actions/setup-python@v6
                 with:
                    python-version: 3.12 
                              
               - name: Run Tests
                 run: python -m pytest -v  
