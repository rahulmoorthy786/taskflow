# Goal - Ensure the docker files nad Docker Images are security tested.

name: Docker Scan

on:
    workflow_call:

jobs:
    docker-file-lint-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v7

            - name: Dockerfile Lint
              uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: ./Dockerfile
            
            - name: Check secret availability
              shell: bash
              run: |
                echo "Username: ${{ vars.DOCKERHUB_USERNAME }}"

                if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
                  echo "DOCKERHUB_TOKEN is EMPTY"
                  exit 1
                else
                  echo "DOCKERHUB_TOKEN is available"
                fi    
            
            - name: Docker Setup Login
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
                      
            - name: Docker Build
              run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/taskflow-build:latest .

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: ${{ vars.DOCKERHUB_USERNAME }}/taskflow-build:latest
                format: 'table'
                exit-code: '1'
                ignore-unfixed: true
                vuln-type: 'os,library'
                severity: 'CRITICAL,HIGH'  

                  
