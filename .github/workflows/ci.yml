# Goal - I have to Lint, Build, Test the code for the project.

name: CI

on:
  push:
    branches: [feat/dockerization]

jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install Dependencies
        run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

      - name: Lint Code
        run: |
          pip install flake8
          flake8 taskflow   
