# Goal - To Run End to End DecSecOps pipeline 

name: DevSecOps

on:
    push:
        branches: [main]

jobs:
    
    code-quality:
        uses: ./.github/workflows/code-quality.yml

    # Secret scanning
    secret-scanning:
        uses: ./.github/workflows/secret-scanning.yml

    
    dependency-checks:
        uses: ./.github/workflows/dependency-scan.yml

    docker-checks:
       uses: ./.github/workflows/docker-scans.yml
       secrets: inherit

    sonar_qube:
        uses: ./.github/workflows/sonar-scan.yml
        secrets: inherit

    code-tests:
        uses:  ./.github/workflows/code-tests.yml

    docker-push:
        uses: ./.github/workflows/docker-push.yml
        needs: [code-quality,secret-scanning,dependency-checks,docker-checks,sonar_qube,code-tests]
        secrets: inherit


    deploy:
        needs: [docker-push]
        uses: ./.github/workflows/deploy.yml
        secrets: inherit

    dast-scan:
        needs: [deploy]
        uses: ./.github/workflows/dast.yml
        secrets: inherit